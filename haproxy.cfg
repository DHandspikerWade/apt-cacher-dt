defaults
    log global

    timeout client  10m
    timeout connect 60s
    timeout server  10m

frontend apt_proxy
    bind *:3142
    mode http

    acl is_connect method CONNECT

    use_backend https_tunnel if is_connect
    default_backend nginx

backend nginx
    mode http
    server nginx 127.0.0.1:4444

backend https_tunnel
    mode http

    http-request set-var(req.host) hdr(host)
    http-request set-dst var(req.host)
    http-request set-method GET if FALSE

    server tunnel 0.0.0.0:443


frontend stats # TODO Remove me
  mode http
  bind :3142
  stats enable
  stats refresh 1s
  stats uri /stats
  stats show-modules
